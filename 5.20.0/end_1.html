<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>전체 결함 현황</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #f5f6f8;
      color: #222;
      font-size: 12px;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    .page-title {
      margin: 0 0 20px;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.4;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .summary-card {
      background: #fff;
      border: 1px solid #e4e7ec;
      border-radius: 20px;
      padding: 20px 24px;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
      min-height: 92px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .summary-card strong {
      font-size: 12px;
      line-height: 1.5;
      font-weight: 700;
    }

    .panel {
      background: #fff;
      border: 1px solid #e4e7ec;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
      margin-bottom: 24px;
    }

    .panel h2,
    .panel h3 {
      margin: 0 0 20px;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.4;
    }

    .chart-box {
      position: relative;
      width: 100%;
      height: 380px;
    }

    .chart-box.donut {
      height: 460px;
    }

    .desc-box {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #eef1f4;
    }

    .desc-box p {
      margin: 0 0 12px;
      font-size: 12px;
      line-height: 1.7;
      font-weight: 700;
    }

    .desc-box ul {
      margin: 0;
      padding-left: 18px;
    }

    .desc-box li {
      margin-bottom: 8px;
      font-size: 12px;
      line-height: 1.6;
    }

    .note {
      margin-top: 12px;
      font-size: 12px;
      color: #667085;
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      body {
        padding: 16px;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .panel {
        padding: 20px;
      }

      .chart-box {
        height: 320px;
      }

      .chart-box.donut {
        height: 400px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="page-title">전체 결함 현황</h1>

    <div class="summary-grid">
      <div class="summary-card">
        <strong>전체: 82건</strong>
      </div>
      <div class="summary-card">
        <strong>수정 정상 반영: 60건 (73.2%)</strong>
      </div>
      <div class="summary-card">
        <strong>추후 수정: 2건 (2.4%)</strong>
      </div>
      <div class="summary-card">
        <strong>결함아님: 20건 (24.4%)</strong>
      </div>
    </div>

    <div class="panel">
      <h2>막대 그래프</h2>
      <div class="chart-box">
        <canvas id="barChart"></canvas>
      </div>
    </div>

    <div class="panel">
      <h2>비율</h2>
      <div class="chart-box donut">
        <canvas id="doughnutChart"></canvas>
      </div>

      <div class="desc-box">
        <p>
          총 <strong>82건</strong> 중
          <strong>60건(73.2%)</strong> 수정사항 정상 반영,
          <strong>2건</strong> 추후 수정,
          <strong>20건</strong> 결함아님 처리
        </p>
        <ul>
          <li>수정 완료 확인 건 중 <strong>7건</strong>은 추후 수정 버전 반영 예정으로 이관</li>
          <li>추후 수정 <strong>2건</strong>은 백로그 이관</li>
          <li>결함아님 <strong>20건</strong>은 Closed 처리</li>
        </ul>
        <div class="note">
          ※ 차트 수치는 총합 82건 기준으로 집계했으며, “7건 추후 수정 버전 반영 예정”은 별도 관리 메모로 표기했습니다.
        </div>
      </div>
    </div>
  </div>

  <script>
    const totalCount = 82;
    const fixedCount = 60;
    const futureCount = 2;
    const invalidCount = 20;

    const commonLegend = {
      labels: {
        font: {
          size: 12,
          family: 'Arial, Apple SD Gothic Neo, Noto Sans KR, sans-serif'
        },
        color: '#222',
        padding: 16
      }
    };

    new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: {
        labels: ['수정 정상 반영', '추후 수정', '결함아님'],
        datasets: [{
          label: '건수',
          data: [fixedCount, futureCount, invalidCount],
          backgroundColor: ['#3FA9F5', '#FF5C8A', '#21C87A'],
          borderRadius: 8,
          borderSkipped: false
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        indexAxis: 'y',
        plugins: {
          legend: {
            position: 'bottom',
            ...commonLegend
          },
          tooltip: {
            titleFont: {
              size: 12
            },
            bodyFont: {
              size: 12
            },
            callbacks: {
              label: function(context) {
                const value = context.raw;
                const percent = ((value / totalCount) * 100).toFixed(1);
                return `${context.label}: ${value}건 (${percent}%)`;
              }
            }
          }
        },
        scales: {
          x: {
            beginAtZero: true,
            max: 70,
            ticks: {
              stepSize: 5,
              color: '#444',
              font: {
                size: 12
              }
            },
            grid: {
              color: '#e5e7eb'
            }
          },
          y: {
            ticks: {
              color: '#222',
              font: {
                size: 12,
                weight: '700'
              }
            },
            grid: {
              color: '#e5e7eb'
            }
          }
        }
      }
    });

    new Chart(document.getElementById('doughnutChart'), {
      type: 'doughnut',
      data: {
        labels: ['수정 정상 반영', '추후 수정', '결함아님'],
        datasets: [{
          data: [fixedCount, futureCount, invalidCount],
          backgroundColor: ['#3FA9F5', '#FF5C8A', '#21C87A'],
          borderColor: '#ffffff',
          borderWidth: 3,
          hoverOffset: 6
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '62%',
        plugins: {
          legend: {
            position: 'bottom',
            ...commonLegend
          },
          tooltip: {
            titleFont: {
              size: 12
            },
            bodyFont: {
              size: 12
            },
            callbacks: {
              label: function(context) {
                const value = context.raw;
                const percent = ((value / totalCount) * 100).toFixed(1);
                return `${context.label}: ${value}건 (${percent}%)`;
              }
            }
          }
        }
      },
      plugins: [{
        id: 'centerText',
        beforeDraw(chart) {
          const { width, height, ctx } = chart;
          ctx.save();

          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';

          ctx.font = '700 12px Arial';
          ctx.fillStyle = '#666';
          ctx.fillText('전체', width / 2, height / 2 - 12);

          ctx.font = '800 20px Arial';
          ctx.fillStyle = '#111';
          ctx.fillText(`${totalCount}건`, width / 2, height / 2 + 12);

          ctx.restore();
        }
      }]
    });
  </script>
</body>
</html>
