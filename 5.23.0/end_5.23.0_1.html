<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>전체 결함 현황</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 12px;
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #f5f6f8;
      color: #222;
      font-size: 11px;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    .page-title {
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.25;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .summary-card {
      background: #fff;
      border: 1px solid #e4e7ec;
      border-radius: 10px;
      padding: 10px 12px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.035);
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .summary-card strong {
      font-size: 11px;
      line-height: 1.35;
      font-weight: 700;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .panel {
      background: #fff;
      border: 1px solid #e4e7ec;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.035);
      margin-bottom: 0;
    }

    .panel h2,
    .panel h3 {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.25;
    }

    .chart-box {
      position: relative;
      width: 100%;
      height: 170px;
    }

    .chart-box.donut {
      height: 180px;
    }

    .desc-box {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #eef1f4;
    }

    .desc-box p {
      margin: 0 0 6px;
      font-size: 10px;
      line-height: 1.45;
      font-weight: 700;
    }

    .desc-box ul {
      margin: 0;
      padding-left: 14px;
    }

    .desc-box li {
      margin-bottom: 3px;
      font-size: 10px;
      line-height: 1.35;
    }

    .note {
      margin-top: 6px;
      font-size: 10px;
      color: #667085;
      line-height: 1.35;
    }

    @media (max-width: 768px) {
      body {
        padding: 10px;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .chart-grid {
        grid-template-columns: 1fr;
      }

      .panel {
        padding: 12px;
      }

      .chart-box {
        height: 150px;
      }

      .chart-box.donut {
        height: 160px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="page-title">전체 결함 현황</h1>

    <div class="summary-grid">
      <div class="summary-card">
        <strong>전체: 22건</strong>
      </div>
      <div class="summary-card">
        <strong>수정 정상 반영: 22건 (100.0%)</strong>
      </div>
      <div class="summary-card">
        <strong>추후 수정: 0건 (0.0%)</strong>
      </div>
      <div class="summary-card">
        <strong>결함아님: 0건 (0.0%)</strong>
      </div>
    </div>

    <div class="chart-grid">
      <div class="panel">
        <h2>막대 그래프</h2>
        <div class="chart-box">
          <canvas id="barChart"></canvas>
        </div>
      </div>

      <div class="panel">
        <h2>비율</h2>
        <div class="chart-box donut">
          <canvas id="doughnutChart"></canvas>
        </div>

        <div class="desc-box">
          <p>
            총 <strong>22건</strong> 중
            <strong>22건(100.0%)</strong> 수정 정상 반영,
            <strong>0건</strong> 추후 수정,
            <strong>0건</strong> 결함아님
          </p>
          <div class="note">
            ※ Notion 링크 기준 자동 집계: 전체 22건 / 수정 정상 반영 22건 / 추후 수정 0건 / 결함아님 0건
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const totalCount = 22;
    const fixedCount = 22;
    const futureCount = 0;
    const invalidCount = 0;

    const commonLegend = {
      labels: {
        font: {
          size: 10,
          family: 'Arial, Apple SD Gothic Neo, Noto Sans KR, sans-serif'
        },
        color: '#222',
        padding: 8
      }
    };

    new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: {
        labels: ['수정 정상 반영', '추후 수정', '결함아님'],
        datasets: [{
          label: '건수',
          data: [fixedCount, futureCount, invalidCount],
          backgroundColor: ['#3FA9F5', '#FF5C8A', '#21C87A'],
          borderRadius: 5,
          borderSkipped: false
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        indexAxis: 'y',
        plugins: {
          legend: {
            position: 'bottom',
            ...commonLegend
          },
          tooltip: {
            titleFont: {
              size: 10
            },
            bodyFont: {
              size: 10
            },
            callbacks: {
              label: function(context) {
                const value = context.raw;
                const percent = ((value / totalCount) * 100).toFixed(1);
                return `${context.label}: ${value}건 (${percent}%)`;
              }
            }
          }
        },
        scales: {
          x: {
            beginAtZero: true,
            ticks: {
              stepSize: 5,
              color: '#444',
              font: {
                size: 10
              }
            },
            grid: {
              color: '#e5e7eb'
            }
          },
          y: {
            ticks: {
              color: '#222',
              font: {
                size: 10,
                weight: '700'
              }
            },
            grid: {
              color: '#e5e7eb'
            }
          }
        }
      }
    });

    new Chart(document.getElementById('doughnutChart'), {
      type: 'doughnut',
      data: {
        labels: ['수정 정상 반영', '추후 수정', '결함아님'],
        datasets: [{
          data: [fixedCount, futureCount, invalidCount],
          backgroundColor: ['#3FA9F5', '#FF5C8A', '#21C87A'],
          borderColor: '#ffffff',
          borderWidth: 2,
          hoverOffset: 4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '62%',
        plugins: {
          legend: {
            position: 'bottom',
            ...commonLegend
          },
          tooltip: {
            titleFont: {
              size: 10
            },
            bodyFont: {
              size: 10
            },
            callbacks: {
              label: function(context) {
                const value = context.raw;
                const percent = ((value / totalCount) * 100).toFixed(1);
                return `${context.label}: ${value}건 (${percent}%)`;
              }
            }
          }
        }
      },
      plugins: [{
        id: 'centerText',
        beforeDraw(chart) {
          const { width, height, ctx } = chart;
          ctx.save();

          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';

          ctx.font = '700 10px Arial';
          ctx.fillStyle = '#666';
          ctx.fillText('전체', width / 2, height / 2 - 9);

          ctx.font = '800 16px Arial';
          ctx.fillStyle = '#111';
          ctx.fillText(`${totalCount}건`, width / 2, height / 2 + 10);

          ctx.restore();
        }
      }]
    });
  </script>
</body>
</html>
